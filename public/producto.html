<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Producto — ARD Suplementos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --white:#ffffff;
    --bg-soft:#f5f8fc;
    --ink:#0e1c30;
    --navy-950:#0a1626;
    --navy-900:#11223c;
    --navy-800:#1a3357;
    --steel-600:#4f76a8;
    --steel-500:#6f93c1;
    --steel-300:#a9c3de;
    --steel-100:#e7eef7;
    --line:#e3e9f2;
    --accent:#2f6fb0;
    --accent-light:#4886c9;
    --flame:#e0563f;
    --flame-dark:#c73f2a;

    --font-display:'Poppins', sans-serif;
    --font-cond:'Poppins', sans-serif;
    --font-body:'Inter', sans-serif;
  }

  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    font-family:var(--font-body);
    background:var(--white);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  img{max-width:100%;display:block;}
  a{text-decoration:none;color:inherit;}
  button, input, select{font-family:inherit;}
  button{cursor:pointer;}

  .wrap{max-width:1220px;margin:0 auto;padding:0 24px;}
  @media (max-width:480px){ .wrap{padding:0 16px;} }

  /* -------- Header -------- */
  header.nav{
    position:sticky; top:0; z-index:60;
    background:rgba(255,255,255,0.98);
    backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);
    box-shadow:0 2px 14px rgba(10,22,38,0.08);
    transition:transform .28s ease;
  }
  header.nav.nav-hidden{
    transform:translateY(-100%);
  }
  .nav-inner{
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 0;
    position:relative;
    gap:10px;
  }
  .nav-brand{display:flex;align-items:center;gap:12px;min-width:0;flex:1 1 auto;overflow:hidden;}
  .nav-brand .logo-img{
    height:140px;width:auto;display:block;
    max-width:100%;
  }
  .nav-links{display:flex;gap:22px;align-items:center;}
  .nav-links a{
    font-family:var(--font-cond); font-weight:600; font-size:14px;
    letter-spacing:0.02em; text-transform:uppercase; color:var(--navy-900);
    transition:color .18s ease;
  }
  .nav-links a:hover{color:var(--accent);}
  .nav-links a.active{color:var(--accent); text-decoration:underline; text-underline-offset:6px;}
  .nav-cta{
    background:var(--flame);
    color:#fff !important;
    padding:10px 20px;
    border-radius:999px;
    font-weight:700;
    box-shadow:0 8px 18px rgba(224,86,63,0.35);
  }
  .nav-cta:hover{background:var(--flame-dark);}

  /* -------- Nav toggle (hamburguesa, mobile) -------- */
  .nav-toggle{
    display:none; width:40px;height:40px; border:none; background:transparent;
    color:var(--navy-900); align-items:center; justify-content:center; flex-direction:column; gap:5px;
    flex-shrink:0; position:relative; z-index:75;
  }
  .nav-toggle span{ display:block; width:24px; height:2px; background:var(--navy-900); border-radius:2px; transition:transform .2s ease, opacity .2s ease; }
  .nav-toggle[aria-expanded="true"] span:nth-child(1){ transform:translateY(7px) rotate(45deg); }
  .nav-toggle[aria-expanded="true"] span:nth-child(2){ opacity:0; }
  .nav-toggle[aria-expanded="true"] span:nth-child(3){ transform:translateY(-7px) rotate(-45deg); }

  @media (max-width:480px){
    .nav-brand .logo-img{ height:100px; }
  }
  @media (max-width:360px){
    .nav-brand .logo-img{ height:82px; }
  }

  /* -------- Menú "Marcas" con buscador -------- */
  .nav-item-marcas{ position:relative; }
  .nav-marcas-trigger{ display:flex !important; align-items:center; gap:5px; cursor:pointer; background:none; border:none; }
  .nav-marcas-trigger svg{ width:11px;height:11px; transition:transform .18s ease; }
  .nav-item-marcas.open .nav-marcas-trigger svg,
  .nav-item-marcas:hover .nav-marcas-trigger svg{ transform:rotate(180deg); }

  .marcas-mega{
    position:absolute; top:calc(100% + 16px); left:50%;
    transform:translateX(-50%) translateY(6px);
    width:560px; max-width:min(560px, 92vw);
    background:#fff; border-radius:18px;
    box-shadow:0 26px 54px rgba(10,22,38,0.32);
    padding:18px; z-index:70;
    opacity:0; visibility:hidden; pointer-events:none;
    transition:opacity .18s ease, transform .18s ease, visibility .18s;
  }
  .nav-item-marcas:hover .marcas-mega,
  .nav-item-marcas.open .marcas-mega{
    opacity:1; visibility:visible; pointer-events:auto; transform:translateX(-50%) translateY(0);
  }
  .marcas-mega-buscador{ position:relative; margin-bottom:14px; }
  .marcas-mega-buscador input[type="search"]{
    width:100%; border:1px solid var(--line); border-radius:999px;
    padding:12px 18px; font-size:14px; color:var(--ink); background:var(--bg-soft);
  }
  .marcas-mega-buscador input[type="search"]:focus{ outline:2px solid var(--accent-light); outline-offset:2px; }
  .marcas-mega-buscador .buscador-resultados{
    position:absolute; top:calc(100% + 8px); left:0; right:0;
    background:#fff; border:1px solid var(--line); border-radius:14px;
    box-shadow:0 20px 40px rgba(17,34,60,0.14);
    max-height:320px; overflow-y:auto; z-index:40;
    display:none;
  }
  .marcas-mega-buscador .buscador-resultados.visible{display:block;}
  .marcas-mega-buscador .buscador-item{
    display:flex; align-items:center; gap:12px; padding:10px 14px;
    border-bottom:1px solid var(--line);
  }
  .marcas-mega-buscador .buscador-item:hover{background:var(--bg-soft);}
  .marcas-mega-buscador .buscador-item:last-child{border-bottom:none;}
  .marcas-mega-buscador .buscador-item img{width:40px;height:40px;object-fit:contain;border-radius:6px;background:var(--bg-soft); flex-shrink:0;}
  .marcas-mega-buscador .buscador-item .info{flex:1; min-width:0;}
  .marcas-mega-buscador .buscador-item .info .nombre{font-size:13.5px; font-weight:600; color:var(--navy-900); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .marcas-mega-buscador .buscador-item .info .marca{font-size:11px; color:var(--accent); text-transform:uppercase; letter-spacing:0.02em;}
  .marcas-mega-buscador .buscador-item .precio{font-weight:700; font-size:13.5px; color:var(--navy-900); white-space:nowrap; flex-shrink:0;}
  .marcas-mega-buscador .buscador-vertodos{
    display:block; text-align:center; padding:12px; font-size:13px; font-weight:700;
    color:var(--accent); text-transform:uppercase; letter-spacing:0.02em;
  }
  .marcas-mega-buscador .buscador-vertodos:hover{background:var(--bg-soft);}
  .marcas-mega-buscador .buscador-vacio{padding:16px; text-align:center; color:var(--steel-600); font-size:13.5px;}
  .marcas-mega-lista{
    display:grid; grid-template-columns:repeat(2,1fr); gap:6px 14px;
    max-height:280px; overflow-y:auto;
  }
  .marcas-mega-lista a{
    display:block; padding:9px 4px; font-family:var(--font-body); font-weight:600; font-size:13.5px;
    color:var(--navy-800); border-bottom:1px solid var(--line); text-transform:none; letter-spacing:0;
    transition:color .16s ease;
  }
  .marcas-mega-lista a:hover{ color:var(--accent); }
  .marcas-mega-vertodas{
    grid-column:1 / -1; text-align:center; color:var(--accent) !important; font-weight:700 !important;
    text-transform:uppercase; letter-spacing:0.02em; border-bottom:none !important; padding-top:12px !important;
  }

  @media (max-width:820px){
    .nav-toggle{ display:flex; }
    .nav-links{
      position:fixed; top:0; left:0; right:0;
      height:100vh; height:100dvh;
      box-sizing:border-box;
      padding:88px 22px calc(24px + env(safe-area-inset-bottom, 0px));
      margin:0;
      flex-direction:column; align-items:stretch; gap:0;
      background:var(--navy-950);
      transform:translateX(100%);
      transition:transform .28s ease;
      overflow-y:auto;
      -webkit-overflow-scrolling:touch;
      overscroll-behavior:contain;
      z-index:65;
    }
    .nav-links.open{ transform:translateX(0); }
    .nav-links a{ padding:15px 2px; border-bottom:1px solid rgba(255,255,255,0.08); font-size:15px; flex-shrink:0; color:var(--steel-100); }
    .nav-links a:hover{ color:#fff; }
    .nav-links a.active{ color:#fff; }
    .nav-links .nav-cta{ margin-top:16px; justify-content:center; text-align:center; border-bottom:none; flex-shrink:0; color:#fff !important; }
    .nav-toggle[aria-expanded="true"] span{ background:#fff; }
    .nav-marcas-trigger{ justify-content:space-between; }
    .marcas-mega{
      position:static; width:auto; max-width:none; transform:none !important;
      opacity:1; visibility:visible; pointer-events:auto;
      box-shadow:none; background:rgba(255,255,255,0.05); border-radius:12px;
      padding:14px; margin:4px 0 8px;
      display:none;
    }
    .nav-item-marcas.open .marcas-mega{ display:block; }
    .marcas-mega-lista{ max-height:none; overflow-y:visible; }
    .marcas-mega-lista a{ color:var(--steel-100); border-bottom:1px solid rgba(255,255,255,0.1); }
    .marcas-mega-lista a:hover{ color:#fff; }
  }

  /* -------- Volver -------- */
  .volver-inicio{
    display:inline-flex; align-items:center; gap:6px;
    font-family:var(--font-cond); font-weight:600; font-size:13px;
    color:var(--steel-600); text-decoration:none; margin:22px 0 6px;
    transition:color .15s ease;
  }
  .volver-inicio svg{ width:15px; height:15px; transition:transform .15s ease; }
  .volver-inicio:hover{ color:var(--accent); }
  .volver-inicio:hover svg{ transform:translateX(-3px); }

  /* -------- Detalle de producto -------- */
  .detalle-section{ padding:8px 0 60px; }
  .detalle-grid{
    display:grid; grid-template-columns:minmax(280px, 460px) 1fr;
    gap:40px; align-items:start; margin-top:14px;
  }
  @media (max-width:820px){
    .detalle-grid{ grid-template-columns:1fr; gap:22px; }
  }

  .detalle-img{
    width:100%; aspect-ratio:1/1; background:var(--bg-soft);
    border:1px solid var(--line); border-radius:18px;
    display:flex; align-items:center; justify-content:center; overflow:hidden;
    padding:18px;
  }
  .detalle-img img{ width:100%; height:100%; object-fit:contain; }
  .placeholder-icon{ width:64px; height:64px; color:var(--steel-500); }

  .detalle-badges{ display:flex; gap:8px; margin-bottom:10px; flex-wrap:wrap; }
  .detalle-badge{
    font-family:var(--font-cond); font-weight:600; font-size:11px;
    letter-spacing:0.02em; text-transform:uppercase;
    background:var(--navy-900); color:#fff; padding:5px 11px; border-radius:999px;
  }
  .detalle-badge.oferta{ background:var(--flame); }

  .detalle-marca{
    font-family:var(--font-cond); font-size:13px; font-weight:700;
    letter-spacing:0.04em; text-transform:uppercase; color:var(--accent);
  }
  .detalle-nombre{
    font-family:var(--font-display); font-weight:700; font-size:clamp(24px,3.4vw,34px);
    color:var(--navy-900); line-height:1.2; margin:6px 0 4px;
  }
  .detalle-categoria{ font-size:13px; color:var(--steel-600); margin-bottom:18px; }

  .detalle-precios{ margin-bottom:6px; }
  .detalle-precio-row{ display:flex; align-items:baseline; gap:12px; flex-wrap:wrap; }
  .detalle-precio{ font-family:var(--font-display); font-size:32px; font-weight:800; color:var(--navy-900); }
  .detalle-precio-anterior{ font-size:16px; color:#9aa8bb; text-decoration:line-through; }
  .detalle-precio-label{
    font-size:11px; color:var(--steel-600); text-transform:uppercase; letter-spacing:0.03em;
    margin-top:2px;
  }
  .detalle-precio-tarjeta{ font-size:14.5px; color:var(--steel-600); margin-top:4px; }

  .detalle-stock{
    display:inline-block; margin:14px 0 20px; font-size:13px; font-weight:600;
    padding:6px 12px; border-radius:999px; background:var(--bg-soft); color:var(--navy-800);
  }
  .detalle-stock.sin-stock{ background:#fde2e2; color:var(--flame-dark); }

  .detalle-descripcion{
    font-size:14.5px; line-height:1.65; color:var(--ink); margin-bottom:26px;
    white-space:pre-line;
  }

  .detalle-acciones{ display:flex; gap:12px; flex-wrap:wrap; }
  .detalle-btn{
    display:flex; align-items:center; justify-content:center; gap:9px;
    font-family:var(--font-cond); font-weight:700; font-size:14px; letter-spacing:0.02em;
    text-transform:uppercase; padding:14px 22px; border-radius:10px;
    border:none; flex:1 1 200px; transition:background .16s ease, opacity .16s ease;
  }
  .detalle-btn svg{ width:17px; height:17px; }
  .detalle-btn-carrito{ background:var(--navy-900); color:#fff !important; }
  .detalle-btn-carrito:hover{ background:var(--accent); }
  .detalle-btn-carrito:disabled{ background:var(--steel-300); cursor:not-allowed; }
  .detalle-btn-whatsapp{ background:#25d366; color:#fff !important; }
  .detalle-btn-whatsapp:hover{ background:#1fb958; }

  .detalle-estado{
    padding:80px 4px; text-align:center; color:var(--steel-600); font-size:15px;
  }

  footer.pie{
    background:var(--navy-950); color:var(--steel-100);
    padding:28px 0; text-align:center; font-size:13px;
  }
  footer.pie a{color:var(--steel-100); font-weight:600;}
</style>
</head>
<body>

<header class="nav">
  <div class="wrap nav-inner">
    <a class="nav-brand" href="/"><img class="logo-img" src="logogrande.jpeg" alt="ARD Suplementos"></a>

    <button class="nav-toggle" id="nav-toggle" aria-label="Abrir menú" aria-expanded="false" aria-controls="nav-links">
      <span></span><span></span><span></span>
    </button>
    <nav class="nav-links" id="nav-links">
      <a href="/">Inicio</a>
      <a href="/#novedades">Novedades</a>
      <a href="/#ofertas">Ofertas</a>

      <div class="nav-item-marcas" id="nav-item-marcas">
        <a href="/#marcas" class="nav-marcas-trigger" id="marcas-trigger">
          Marcas
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 7.5l5 5 5-5"/></svg>
        </a>
        <div class="marcas-mega" id="marcas-mega">
          <div class="marcas-mega-buscador">
            <input type="search" id="marcas-mega-input" placeholder="Buscar productos o marcas…" autocomplete="off">
            <div class="buscador-resultados" id="marcas-mega-resultados"></div>
          </div>
          <div class="marcas-mega-lista">
            <a href="/productos.html?marca=Star+Nutrition">Star Nutrition</a>
            <a href="/productos.html?marca=One+Fit">One Fit</a>
            <a href="/productos.html?marca=Gold">Gold</a>
            <a href="/productos.html?marca=Ena">Ena</a>
            <a href="/productos.html?marca=Granger">Granger</a>
            <a href="/productos.html?marca=Gentech">Gentech</a>
            <a href="/productos.html?marca=Mervick">Mervick</a>
            <a href="/productos.html?marca=Everlast">Everlast</a>
            <a href="/#marcas" class="marcas-mega-vertodas" id="marcas-vertodas">Ver todas las marcas →</a>
          </div>
        </div>
      </div>

      <a href="/productos.html">Productos</a>
      <a class="nav-cta" href="https://wa.me/5493834993955" target="_blank" rel="noopener">Escribinos</a>
    </nav>
  </div>
</header>

<div class="wrap">
  <a class="volver-inicio" href="/productos.html">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.5 4.5L7 10l5.5 5.5"/></svg>
    Volver a productos
  </a>
</div>

<section class="detalle-section">
  <div class="wrap" id="detalle-wrap">
    <div class="detalle-estado" id="detalle-estado">Cargando producto…</div>
  </div>
</section>

<footer class="pie">
  <div class="wrap">
    ARD Suplementos · Sarmiento 722, Catamarca · <a href="https://wa.me/5493834993955" target="_blank" rel="noopener">Escribinos por WhatsApp</a>
  </div>
</footer>

<script>
(function(){
  const WHATSAPP_NUMBER = "5493834993955";

  function formatearPrecio(valor){
    try{ return new Intl.NumberFormat('es-AR', { style:'currency', currency:'ARS', maximumFractionDigits:0 }).format(valor); }
    catch(e){ return '$' + valor; }
  }

  function iconoPlaceholder(){
    return '<svg class="placeholder-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">' +
      '<rect x="5" y="3" width="14" height="18" rx="2"/><path d="M9 3v3h6V3"/><path d="M9 12h6M9 16h6"/></svg>';
  }

  function pintarProducto(p){
    document.title = p.name + ' — ARD Suplementos';

    const tieneOferta = p.oldPrice && Number(p.oldPrice) > Number(p.price);
    const sinStock = Number(p.stock) <= 0;
    const mensaje = encodeURIComponent('Hola! Quiero consultar por "' + p.name + '"' + (p.brand ? (' de ' + p.brand) : '') + '.');
    const linkWhatsapp = 'https://wa.me/' + WHATSAPP_NUMBER + '?text=' + mensaje;
    const imagenHtml = p.image ? '<img src="' + p.image + '" alt="' + p.name.replace(/"/g,'') + '">' : iconoPlaceholder();

    let badgesHtml = '';
    if (p.featured) badgesHtml += '<span class="detalle-badge">Destacado</span>';
    if (tieneOferta) badgesHtml += '<span class="detalle-badge oferta">Oferta</span>';

    const wrap = document.getElementById('detalle-wrap');
    wrap.innerHTML =
      '<div class="detalle-grid">' +
        '<div class="detalle-img">' + imagenHtml + '</div>' +
        '<div class="detalle-info">' +
          (badgesHtml ? '<div class="detalle-badges">' + badgesHtml + '</div>' : '') +
          (p.brand ? '<div class="detalle-marca">' + p.brand + '</div>' : '') +
          '<h1 class="detalle-nombre">' + p.name + '</h1>' +
          (p.category ? '<div class="detalle-categoria">' + p.category + '</div>' : '') +
          '<div class="detalle-precios">' +
            '<div class="detalle-precio-row">' +
              '<span class="detalle-precio">' + formatearPrecio(p.price) + '</span>' +
              (tieneOferta ? '<span class="detalle-precio-anterior">' + formatearPrecio(p.oldPrice) + '</span>' : '') +
            '</div>' +
            (p.cardPrice ? '<div class="detalle-precio-label">Efectivo/transferencia</div>' : '') +
            (p.cardPrice ? '<div class="detalle-precio-tarjeta">' + formatearPrecio(p.cardPrice) + ' con tarjeta</div>' : '') +
          '</div>' +
          '<span class="detalle-stock' + (sinStock ? ' sin-stock' : '') + '">' +
            (sinStock ? 'Sin stock' : ('Stock disponible: ' + p.stock)) +
          '</span>' +
          (p.description ? '<div class="detalle-descripcion">' + p.description + '</div>' : '') +
          '<div class="detalle-acciones">' +
            '<button type="button" class="detalle-btn detalle-btn-carrito" id="detalle-add-carrito"' + (sinStock ? ' disabled' : '') + '>' +
              '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>' +
              (sinStock ? 'Sin stock' : 'Agregar al carrito') +
            '</button>' +
            '<a class="detalle-btn detalle-btn-whatsapp" href="' + linkWhatsapp + '" target="_blank" rel="noopener">' +
              '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.75.46 3.4 1.26 4.83L2 22l5.42-1.42a9.85 9.85 0 0 0 4.62 1.17h.01c5.46 0 9.9-4.45 9.9-9.91 0-2.65-1.03-5.13-2.9-7C17.17 3.03 14.7 2 12.04 2zm0 18.13a8.2 8.2 0 0 1-4.18-1.14l-.3-.18-3.11.81.83-3.03-.2-.31a8.2 8.2 0 0 1-1.26-4.37c0-4.54 3.7-8.24 8.24-8.24 2.2 0 4.27.86 5.83 2.42a8.18 8.18 0 0 1 2.41 5.83c0 4.54-3.7 8.21-8.26 8.21z"/></svg>' +
              'Consultar por WhatsApp' +
            '</a>' +
          '</div>' +
        '</div>' +
      '</div>';

    const btnCarrito = document.getElementById('detalle-add-carrito');
    if (btnCarrito && !sinStock){
      const textoOriginal = btnCarrito.innerHTML;

      // Si el usuario hace clic muy rápido (antes de que /cart.js termine
      // de cargar), esperamos a que window.ARDCart esté disponible en vez
      // de no hacer nada. Reintenta unas cuantas veces y recién ahí avisa
      // si de verdad no se pudo cargar el carrito.
      function esperarCarrito(intentos){
        return new Promise((resolve, reject) => {
          if (window.ARDCart && typeof window.ARDCart.add === 'function'){
            resolve();
            return;
          }
          if (intentos <= 0){
            reject(new Error('ARDCart no disponible'));
            return;
          }
          setTimeout(() => esperarCarrito(intentos - 1).then(resolve, reject), 150);
        });
      }

      btnCarrito.addEventListener('click', () => {
        if (btnCarrito.disabled) return; // evita doble clic mientras se procesa
        btnCarrito.disabled = true;

        esperarCarrito(20) // hasta ~3 segundos de espera
          .then(() => {
            window.ARDCart.add({
              id: p.id,
              name: p.name,
              brand: p.brand,
              price: p.price,
              cardPrice: p.cardPrice || null,
              oldPrice: p.oldPrice || null,
              image: p.image,
              stock: Number(p.stock) || 0
            });

            btnCarrito.innerHTML =
              '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>' +
              'Agregado al carrito';

            setTimeout(() => {
              btnCarrito.innerHTML = textoOriginal;
              btnCarrito.disabled = false;
            }, 1300);
          })
          .catch((err) => {
            console.error('No se pudo agregar al carrito:', err);
            alert('No pudimos agregar el producto al carrito. Recargá la página e intentá de nuevo.');
            btnCarrito.disabled = false;
          });
      });
    }
  }

  function cargarProducto(){
    const id = new URLSearchParams(window.location.search).get('id');
    const estado = document.getElementById('detalle-estado');
    if (!id){
      estado.textContent = 'No se especificó ningún producto.';
      return;
    }
    fetch('/api/products/' + encodeURIComponent(id))
      .then(res => { if (!res.ok) throw new Error('No encontrado'); return res.json(); })
      .then(pintarProducto)
      .catch(() => {
        estado.textContent = 'No encontramos este producto. Puede que ya no esté disponible.';
      });
  }

  cargarProducto();

  /* ---------- Menú hamburguesa (mobile) ---------- */
  (function(){
    const navToggle = document.getElementById('nav-toggle');
    const navLinks = document.getElementById('nav-links');
    const marcasItem = document.getElementById('nav-item-marcas');
    if (!navToggle || !navLinks) return;

    navToggle.addEventListener('click', () => {
      const abierto = navLinks.classList.toggle('open');
      navToggle.setAttribute('aria-expanded', abierto ? 'true' : 'false');
      document.body.style.overflow = abierto ? 'hidden' : '';
      if (!abierto && marcasItem) marcasItem.classList.remove('open');
    });

    navLinks.querySelectorAll('a').forEach(a => {
      a.addEventListener('click', () => {
        if (a.id === 'marcas-trigger') return;
        navLinks.classList.remove('open');
        navToggle.setAttribute('aria-expanded', 'false');
        document.body.style.overflow = '';
      });
    });
  })();

  /* ---------- Menú "Marcas": toggle + buscador de productos ---------- */
  (function(){
    const item = document.getElementById('nav-item-marcas');
    const trigger = document.getElementById('marcas-trigger');
    const input = document.getElementById('marcas-mega-input');
    const resultados = document.getElementById('marcas-mega-resultados');
    const verTodas = document.getElementById('marcas-vertodas');
    if (!item || !trigger) return;

    function esMobile(){
      return window.matchMedia('(max-width:820px)').matches;
    }

    trigger.addEventListener('click', (e) => {
      e.preventDefault();
      item.classList.toggle('open');
      if (item.classList.contains('open')) {
        setTimeout(() => input && input.focus({ preventScroll: true }), 150);
      }
    });

    if (verTodas){
      verTodas.addEventListener('click', () => {
        item.classList.remove('open');
        const navLinks = document.getElementById('nav-links');
        const navToggle = document.getElementById('nav-toggle');
        if (navLinks && navLinks.classList.contains('open')){
          navLinks.classList.remove('open');
          if (navToggle) navToggle.setAttribute('aria-expanded', 'false');
          document.body.style.overflow = '';
        }
      });
    }

    document.addEventListener('click', (e) => {
      if (!item.contains(e.target)) item.classList.remove('open');
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') item.classList.remove('open');
    });
    window.addEventListener('resize', () => {
      if (!esMobile()) item.classList.remove('open');
    });

    if (input && resultados){
      let debounceTimer;

      function filtrarLocal(texto){
        const t = texto.toLowerCase();
        return (window.TODOS_PRODUCTOS || []).filter(p =>
          (p.name || '').toLowerCase().includes(t) || (p.brand || '').toLowerCase().includes(t)
        );
      }

      function render(productos, texto){
        if (!productos.length){
          resultados.innerHTML = '<div class="buscador-vacio">No encontramos productos para "' + texto + '".</div>';
          resultados.classList.add('visible');
          return;
        }
        const linkTodos = '/productos.html?buscar=' + encodeURIComponent(texto);
        const items = productos.slice(0, 6).map(p => (
          '<a class="buscador-item" href="/producto.html?id=' + encodeURIComponent(p.id) + '">' +
            (p.image ? '<img src="' + p.image + '" alt="">' : '') +
            '<div class="info">' +
              '<div class="nombre">' + p.name + '</div>' +
              (p.brand ? '<div class="marca">' + p.brand + '</div>' : '') +
            '</div>' +
            '<div class="precio">' + formatearPrecio(p.price) + '</div>' +
          '</a>'
        )).join('');
        resultados.innerHTML = items + '<a class="buscador-vertodos" href="' + linkTodos + '">Ver todos los resultados →</a>';
        resultados.classList.add('visible');
      }

      input.addEventListener('input', () => {
        const texto = input.value.trim();
        clearTimeout(debounceTimer);
        if (!texto){
          resultados.classList.remove('visible');
          resultados.innerHTML = '';
          return;
        }
        debounceTimer = setTimeout(() => {
          render(filtrarLocal(texto), texto);
        }, 200);
      });

      input.addEventListener('click', (e) => e.stopPropagation());
    }

    // Precarga la lista completa para que el buscador del menú funcione
    // también dentro de esta página (no solo en productos.html).
    if (!window.TODOS_PRODUCTOS){
      fetch('/api/products').then(r => r.json()).then(list => { window.TODOS_PRODUCTOS = list; }).catch(() => {});
    }
  })();
})();
</script>

<script>
(function(){
  const nav = document.querySelector('header.nav');
  if(!nav) return;
  let lastScroll = window.scrollY;
  const hideAfter = 80;
  let ticking = false;

  function onScroll(){
    const current = window.scrollY;
    const links = document.getElementById('nav-links');
    const menuAbierto = links && links.classList.contains('open');

    if(!menuAbierto){
      if(current > lastScroll && current > hideAfter){
        nav.classList.add('nav-hidden');
      } else {
        nav.classList.remove('nav-hidden');
      }
    }

    lastScroll = current <= 0 ? 0 : current;
    ticking = false;
  }

  window.addEventListener('scroll', function(){
    if(!ticking){
      window.requestAnimationFrame(onScroll);
      ticking = true;
    }
  }, { passive:true });
})();
</script>
