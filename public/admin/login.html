<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ingresar · Panel ARD Suplementos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow+Condensed:wght@500;600;700&family=Barlow:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="admin.css">
</head>
<body>

<div class="login-wrap">
  <div class="login-card">
    <div class="login-brand">
      <div class="badge-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="26" height="26">
          <path d="M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
        </svg>
      </div>
      <h1>ARD Suplementos</h1>
      <p>Panel de administración</p>
    </div>

    <div class="error-msg" id="error-msg"></div>

    <form id="login-form">
      <div class="form-group">
        <label for="username">Usuario</label>
        <input type="text" id="username" name="username" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary" id="submit-btn">Ingresar</button>
    </form>
  </div>
</div>

<script>
  const form = document.getElementById('login-form');
  const errorMsg = document.getElementById('error-msg');
  const submitBtn = document.getElementById('submit-btn');

  // Si ya hay sesión activa, redirige directo al dashboard
  fetch('/api/admin/session').then(r => r.json()).then(data => {
    if (data.isAdmin) window.location.href = 'dashboard.html';
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorMsg.classList.remove('visible');
    submitBtn.disabled = true;
    submitBtn.textContent = 'Ingresando…';

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    try {
      const res = await fetch('/api/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });
      const data = await res.json();
      if (!res.ok) {
        errorMsg.textContent = data.error || 'No se pudo iniciar sesión';
        errorMsg.classList.add('visible');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Ingresar';
        return;
      }
      window.location.href = 'dashboard.html';
    } catch (err) {
      errorMsg.textContent = 'Error de conexión con el servidor';
      errorMsg.classList.add('visible');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Ingresar';
    }
  });
</script>

</body>
</html>
